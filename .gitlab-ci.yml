stages:
  - lint
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "$CI_PROJECT_DIR"

cache:
  paths:
    - .cache/pip

lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install ruff
  script:
    - ruff check app/
    - ruff format --check app/
  allow_failure: false

test:
  stage: test
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y libpq-dev gcc
    - pip install -r requirements.txt
    - pip install pytest pytest-cov httpx
    - echo "DATABASE_URL=sqlite:///./test.db" > .env
    - echo "SECRET_KEY=test-secret-key-for-ci-32-chars" >> .env
    - echo "REFRESH_TOKEN_EXPIRE_DAYS=7" >> .env
    - echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env
    - echo "ALGORITHM=HS256" >> .env
    - export PYTHONPATH=$CI_PROJECT_DIR
  script:
    - pytest -v --cov=app --cov-report=term-missing

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk update && apk add openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 "$SSH_PRIVATE_KEY"
    - ssh-add "$SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    - |
      ssh $EC2_USER@$EC2_HOST "
        if [ ! -d ~/robot-payment ]; then
          git clone https://gitlab.com/$CI_PROJECT_PATH.git ~/robot-payment
        fi
        cd ~/robot-payment
        git fetch --all
        git reset --hard origin/main
        echo 'DATABASE_URL=${PRODUCTION_DATABASE_URL}' > .env
        echo 'SECRET_KEY=${PRODUCTION_SECRET_KEY}' >> .env
        echo 'APP_ENV=production' >> .env
        echo 'DEBUG=false' >> .env
        echo 'ALGORITHM=HS256' >> .env
        echo 'ACCESS_TOKEN_EXPIRE_MINUTES=30' >> .env
        echo 'REFRESH_TOKEN_EXPIRE_DAYS=7' >> .env
        sudo docker compose -f docker-compose.prod.yml up -d --build
      "
  only:
    - main

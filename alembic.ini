# Alembic Configuration File
# ==========================

[alembic]
# Path to migration scripts
script_location = migrations
# Template used to generate migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s
# Timezone
timezone = UTC
# Max length of generated identifiers
truncate_slug_length = 40
# Set to true if you want version numbers to be integers
version_path_separator = os
# Source of database schema
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/robotdb

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# PostgreSQL specific configuration (for production)
[postgresql]
url = postgresql://postgres:postgres@db:5432/robotdb

# SQLite configuration (for testing)
[sqlite]
url = sqlite:///./test.db
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: robot-payment-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U robot_user -d robot_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - robot-net

  api:
    build: .
    container_name: robot-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - robot-net

volumes:
  postgres_data:

networks:
  robot-net:
    driver: bridge
